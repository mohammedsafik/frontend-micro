<main class="app-shell">
  @if (isAuthenticated()) {
    <header class="app-nav">
      <div class="container d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 py-3">
        <a class="app-brand text-decoration-none" routerLink="/products">QuickCart</a>

        <nav class="d-flex flex-wrap align-items-center gap-2">
          <a class="app-nav-link" routerLink="/products" routerLinkActive="active">Products</a>
          <a class="app-nav-link" routerLink="/cart" routerLinkActive="active">Cart</a>
          <a class="app-nav-link" routerLink="/tracking" routerLinkActive="active">Track Order</a>
          <a class="app-nav-link" routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
        </nav>

        <div class="d-flex align-items-center gap-2">
          <a class="btn btn-outline-primary position-relative" routerLink="/cart">
            Cart
            <span class="cart-nav-badge">{{ (cartCount$ | async) ?? 0 }}</span>
          </a>
          <button class="btn btn-primary" type="button" (click)="logout()">Logout</button>
        </div>
      </div>
    </header>
  }

  <router-outlet></router-outlet>

  <div class="toast-stack" aria-live="polite" aria-atomic="true">
    @for (toast of toasts(); track toast.id) {
      <div
        class="toast show toast-card"
        [attr.data-variant]="toast.variant"
        role="status"
        [attr.aria-label]="toastLabel(toast)"
      >
        <div class="d-flex">
          <div class="toast-body">
            <div class="fw-bold mb-1">{{ toast.title }}</div>
            <div>{{ toast.message }}</div>
          </div>
          <button
            class="btn-close me-2 m-auto"
            type="button"
            aria-label="Close"
            (click)="dismissToast(toast.id)"
          ></button>
        </div>
      </div>
    }
  </div>
</main>
